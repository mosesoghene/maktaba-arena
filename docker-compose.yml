services:
  db:
    image: postgres:15-alpine
    container_name: maktaba_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=maktaba
      - POSTGRES_USER=maktaba_admin
      - POSTGRES_PASSWORD=maktaba_password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: maktaba_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: maktaba_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_NAME=maktaba
      - POSTGRES_USER=maktaba_admin
      - POSTGRES_PASSWORD=maktaba_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: maktaba_frontend
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: